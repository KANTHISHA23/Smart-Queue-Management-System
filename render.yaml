# Render Blueprint — SmartQueue API
# Docs: https://render.com/docs/blueprint-spec
#
# 1. Create a free PostgreSQL database at https://neon.tech
# 2. Deploy this blueprint on Render
# 3. Set DATABASE_URL (Neon connection string) and CLIENT_URL (Vercel URL) in the dashboard
# 4. After first deploy, open Shell and run: npm run seed

services:
  - type: web
    name: smartqueue-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: ML_PREDICTION_ENABLED
        value: "false"
